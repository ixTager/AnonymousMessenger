spring:
  application:
    name: AnonymousMessenger
  rabbitmq:
    username: guest
    password: guest
    host: localhost
  h2:
    console:
      path: /h2-console
      enabled: true
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 200ms
  datasource:
    url:
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: create-drop


server:
  port: 8080
